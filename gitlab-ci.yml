# .gitlab-ci.yml
# GitLab CI for gaia-commons-council-app-4.0
# Stages: install -> test -> build -> migrate -> deploy
stages:
  - install
  - test
  - build
  - migrate
  - deploy

# Global variables (override per environment in GitLab UI as needed)
variables:
  NODE_ENV: "production"
  NPM_CONFIG_LOGLEVEL: warn
  # speed up npm installs by using cache location
  NPM_CACHE_FOLDER: "$CI_PROJECT_DIR/.npm_cache"

# Cache node_modules and npm cache between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm_cache/
    - node_modules/

# Use node:20 image for node jobs
.default-node-image: &node-image
  image: node:20

# INSTALL: install dependencies once and persist node_modules as an artifact for later jobs
install:
  <<: *node-image
  stage: install
  script:
    - npm ci --include=dev
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

# LINT + TEST: run TypeScript check and unit tests
lint_and_test:
  <<: *node-image
  stage: test
  script:
    - npm run check          # TypeScript typecheck
    - npm run test --if-present
  dependencies:
    - install
  allow_failure: false

# BUILD: produce the production builds (vite + server bundle)
build:
  <<: *node-image
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1h
  dependencies:
    - install
    - lint_and_test

# MIGRATE_PRODUCTION: Manual, protected job; runs only on main and triggers drizzle-kit push after exporting DB URL.
# This job is manual to prevent accidental migrations from feature branches.
migrate_production:
  <<: *node-image
  stage: migrate
  variables:
    NODE_ENV: "production"
  before_script:
    # If PRODUCTION_DATABASE_URL is set in CI variables, export it as DATABASE_URL so drizzle.config.ts picks it up.
    - if [ -n "$PRODUCTION_DATABASE_URL" ]; then export DATABASE_URL="$PRODUCTION_DATABASE_URL"; fi
  script:
    - echo "Running DB migrations against $DATABASE_URL (production)."
    - npx drizzle-kit push
  when: manual
  only:
    - main
  environment:
    name: production
  allow_failure: false

# DEPLOY_TO_RENDER: Trigger a Render deploy via API. Requires RENDER_API_KEY and RENDER_SERVICE_ID CI variables.
deploy_to_render:
  image: curlimages/curl:7.87.0
  stage: deploy
  script:
    - |
      if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
        echo "Render credentials not configured. Skipping deploy."
        exit 1
      fi
    - echo "Triggering Render deploy for service $RENDER_SERVICE_ID..."
    - |
      curl -sS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
        -H "Authorization: Bearer $RENDER_API_KEY" \
        -H "Content-Type: application/json" \
        -d '{"clearCache": true}' \
        -o /tmp/render-response.json
    - cat /tmp/render-response.json
  dependencies:
    - build
  only:
    - main
  environment:
    name: production

# Optional: Docker build & push (alternative deployment path)
# Uncomment and configure DOCKER_REGISTRY, DOCKER_USERNAME, DOCKER_PASSWORD if you prefer building images.
docker_build_and_push:
  image: docker:24.0.2
  services:
    - docker:24-dind
  stage: deploy
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_REGISTRY"
  script:
    - docker build -t "$DOCKER_REGISTRY:$CI_COMMIT_SHORT_SHA" .
    - docker push "$DOCKER_REGISTRY:$CI_COMMIT_SHORT_SHA"
  only:
    - main
  environment:
    name: production
  dependencies:
    - build

# Notes:
# Required CI variables (set in GitLab Settings → CI/CD → Variables):
# - PRODUCTION_DATABASE_URL (production database connection string)
# - SESSION_SECRET (express-session secret)
# - DEPLOY_URL (public URL)
# - CORS_ALLOWED_ORIGINS
# - RENDER_API_KEY (Render API key)
# - RENDER_SERVICE_ID (Render service id)
# Optional variables for Docker option:
# - DOCKER_REGISTRY, DOCKER_USERNAME, DOCKER_PASSWORD
