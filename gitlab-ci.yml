# GitLab CI pipeline for build/test and Render deploy.
# - Installs devDependencies (npm ci --include=dev)
# - Runs typecheck/lint/test (if present) then build
# - Triggers Render deploy via render-deploy.sh (uses RENDER_API_KEY + RENDER_SERVICE_ID variables)
stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "18"

cache:
  key: "${CI_PROJECT_PATH}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm
    - node_modules/

typecheck:
  image: node:${NODE_VERSION}
  stage: test
  script:
    - npm ci --include=dev
    - npx tsc --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_COMMIT_BRANCH

lint:
  image: node:${NODE_VERSION}
  stage: test
  script:
    - npm ci --include=dev
    - npm run lint --if-present
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_COMMIT_BRANCH

js-tests:
  image: node:${NODE_VERSION}
  stage: test
  script:
    - npm ci --include=dev
    - npm test --if-present
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_COMMIT_BRANCH

build:
  image: node:${NODE_VERSION}
  stage: build
  script:
    - npm ci --include=dev
    - npm run build
  artifacts:
    name: "build-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHORT_SHA}"
    expire_in: 1 week
    paths:
      - dist/
      - build/
      - client/dist/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request"
    - if: $CI_COMMIT_BRANCH

deploy-to-render:
  image: curlimages/curl:7.90.0
  stage: deploy
  variables:
    RENDER_API_BASE: "https://api.render.com/v1"
  script:
    - |
      if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
        echo "ERROR: RENDER_API_KEY and RENDER_SERVICE_ID must be set as CI variables."
        exit 1
      fi
      echo "Triggering Render deploy for service id: ${RENDER_SERVICE_ID}"
      RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${RENDER_API_BASE}/services/${RENDER_SERVICE_ID}/deploys" \
        -H "Authorization: Bearer ${RENDER_API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"clearCache":false}')
      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | sed '$d')
      echo "HTTP: $HTTP_CODE"
      echo "$BODY"
      if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
        echo "Render deploy triggered successfully."
      else
        echo "Failed to trigger deploy (HTTP $HTTP_CODE). See response above."
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: manual
  environment:
    name: production
    url: ${RENDER_ENV_URL:-https://your-render-service-url.onrender.com}
