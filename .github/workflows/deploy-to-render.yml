name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY or RENDER_SERVICE_ID not set. Skipping deploy."
            exit 1
          fi
          echo "Triggering deploy for service ${RENDER_SERVICE_ID}..."
          # Render API: POST /v1/services/{serviceId}/deploys
          http_code=$(curl -sS -o /tmp/render-deploy-response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')
          echo "Render response:"
          cat /tmp/render-deploy-response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Render deploy failed (HTTP $http_code)"
            exit 1
          fi
