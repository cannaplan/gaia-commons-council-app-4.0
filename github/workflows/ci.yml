name: CI

on:
  push:
    branches:
      - main
      - "collabs/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node dependencies (including devDependencies)
        run: npm ci --include=dev

      - name: Type check (TS)
        run: npx tsc --noEmit

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Install Python 3.10 (for optional Python tests)
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python deps and pytest (if any)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest || true

      - name: Run Python tests (if any)
        run: |
          . .venv/bin/activate
          if [ -d tests ] || ls tests/*.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "No Python tests found; skipping pytest"
          fi

      - name: Run JS tests (if configured)
        run: npm test --if-present

      - name: Build (frontend/server)
        run: npm run build

      - name: Upload build artifact (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            build
            dist

      - name: Upload test artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: |
            .pytest_cache || true
            test-results || true
